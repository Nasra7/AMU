<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Chat</title>
    <!-- Load Tailwind CSS first -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load your custom CSS after Tailwind to override if needed -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        /* Override header background only - leaving all other styles intact */
        header {
            background-color: transparent !important;
        }
        /* Add character button styles */
        .add-character-btn {
            background-color: var(--button-bg, #4f46e5);
            color: var(--button-text, white);
            transition: all 0.3s ease;
        }
        .add-character-btn:hover {
            background-color: var(--button-hover-bg, #4338ca);
            transform: translateY(-1px);
        }
        /* Ensure toggle labels remain visible in both modes */
        .theme-switch-wrapper .toggle-label {
            color: var(--text-color) !important;
        }
        /* Dark mode styles */
        .dark {
            color-scheme: dark;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--loading-bg, #ffffff);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            overflow: hidden;
            transition: opacity 0.5s ease-out, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #loading-screen.dark {
            background-color: var(--loading-bg-dark, #1a202c);
        }
        
        #loading-screen.hidden {
            opacity: 0;
            transform: scale(1.5);
            pointer-events: none;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(2deg); }
            75% { transform: translateY(5px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        .loading-logo {
            height: 100px;
            width: auto;
            animation: pulse 2s infinite, float 4s ease-in-out infinite;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 8px rgba(79, 70, 229, 0.4));
            transition: all 0.3s ease;
        }
        
        #loading-screen.dark .loading-logo {
            filter: drop-shadow(0 0 12px rgba(129, 140, 248, 0.6));
        }
        
        .loading-text {
            margin-top: 1rem;
            font-size: 1.25rem;
            color: var(--loading-text, #4f46e5);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }
        
        #loading-screen.dark .loading-text {
            color: var(--loading-text-dark, #818cf8);
            text-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
        }
        
        /* Circle animation */
        .loading-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--circle-inner, rgba(79, 70, 229, 0.2)) 0%, var(--circle-outer, rgba(79, 70, 229, 0)) 70%);
            animation: pulse 2s infinite;
            transition: all 0.3s ease;
        }
        
        #loading-screen.dark .loading-circle {
            background: radial-gradient(circle, var(--circle-inner-dark, rgba(129, 140, 248, 0.25)) 0%, var(--circle-outer-dark, rgba(129, 140, 248, 0)) 70%);
        }
        
        /* Particle animations */
        .loading-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--particle-color, #4f46e5);
            border-radius: 50%;
            opacity: 0.6;
            transition: background-color 0.3s ease;
        }
        
        #loading-screen.dark .particle {
            background-color: var(--particle-color-dark, #818cf8);
        }
        
        .particle:nth-child(1) {
            top: 20%;
            left: 20%;
            animation: moveParticle1 5s infinite;
        }
        
        .particle:nth-child(2) {
            top: 80%;
            left: 80%;
            animation: moveParticle2 7s infinite;
        }
        
        .particle:nth-child(3) {
            top: 30%;
            left: 70%;
            animation: moveParticle3 6s infinite;
        }
        
        .particle:nth-child(4) {
            top: 70%;
            left: 30%;
            animation: moveParticle4 8s infinite;
        }
        
        .particle:nth-child(5) {
            top: 50%;
            left: 20%;
            animation: moveParticle5 9s infinite;
        }
        
        .particle:nth-child(6) {
            top: 20%;
            left: 60%;
            animation: moveParticle6 10s infinite;
        }
        
        /* Additional sparkle particles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: var(--sparkle-color, #ffffff);
            border-radius: 50%;
            box-shadow: 0 0 10px 2px var(--sparkle-glow, rgba(79, 70, 229, 0.8));
            opacity: 0;
            transition: background-color 0.3s ease;
        }
        
        #loading-screen.dark .sparkle {
            background-color: var(--sparkle-color-dark, #e2e8f0);
            box-shadow: 0 0 10px 2px var(--sparkle-glow-dark, rgba(129, 140, 248, 0.8));
        }
        
        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0.4); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.4); }
        }
        
        .sparkle:nth-child(1) { top: 25%; left: 30%; animation: sparkle 3s infinite 0.2s; }
        .sparkle:nth-child(2) { top: 35%; left: 65%; animation: sparkle 2.7s infinite 0.5s; }
        .sparkle:nth-child(3) { top: 75%; left: 40%; animation: sparkle 3.2s infinite 0.8s; }
        .sparkle:nth-child(4) { top: 60%; left: 70%; animation: sparkle 2.8s infinite 1.1s; }
        .sparkle:nth-child(5) { top: 45%; left: 25%; animation: sparkle 3.5s infinite 1.4s; }
        
        @keyframes moveParticle1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.2); }
        }
        
        @keyframes moveParticle2 {
            0%, 100% { transform: translate(0, 0) scale(0.9); }
            50% { transform: translate(-120px, -80px) scale(1.1); }
        }
        
        @keyframes moveParticle3 {
            0%, 100% { transform: translate(0, 0) scale(1.1); }
            50% { transform: translate(80px, -100px) scale(0.9); }
        }
        
        @keyframes moveParticle4 {
            0%, 100% { transform: translate(0, 0) scale(0.8); }
            50% { transform: translate(-70px, 90px) scale(1.2); }
        }
        
        @keyframes moveParticle5 {
            0%, 100% { transform: translate(0, 0) scale(1.2); }
            50% { transform: translate(110px, 40px) scale(0.8); }
        }
        
        @keyframes moveParticle6 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-90px, 70px) scale(1.3); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-circle"></div>
        <img src="/static/img/logo1.png" alt="Logo" class="loading-logo">
        <p class="loading-text">Loading...</p>
        <div class="loading-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            
            <!-- Added sparkle elements -->
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
        </div>
    </div>

    <header class="p-4" style="background-color: var(--header-bg); color: var(--header-text);">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-6">
               <a href="/"><img src="/static/img/logo1.png" alt="Logo" class="h-10 w-auto" /></a>
                <a href="/" class="text-2xl font-bold">AMU</a>
                <!-- Add Character Button -->
                <a href="{% url 'add_character' %}" class="add-character-btn px-4 py-2 rounded-lg font-medium">Add Character</a>
            </div>
            <div class="theme-switch-wrapper">
                <span class="toggle-label">Light</span>
                <label class="theme-switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="toggle-label">Dark</span>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center p-4">
        <p>&copy; {% now "Y" %} Character Chat - All rights reserved</p>
    </footer>

    <script src="/static/js/theme-toggle.js"></script>
    {% block scripts %}{% endblock %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loadingScreen = document.getElementById('loading-screen');
            const logo = document.querySelector('.loading-logo');
            const loadingText = document.querySelector('.loading-text');
            const particles = document.querySelectorAll('.particle');
            
            // Check for dark mode from localStorage or system preference
            function checkDarkMode() {
                // First check localStorage if available
                if (localStorage.getItem('theme') === 'dark') {
                    return true;
                }
                // Then check system preference
                else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return true;
                }
                // Default to light mode
                return false;
            }
            
            // Initialize dark mode
            const isDarkMode = checkDarkMode();
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
                if (document.getElementById('theme-toggle')) {
                    document.getElementById('theme-toggle').checked = true;
                }
            }
            
            // Function to update theme colors based on current mode
            function updateLoadingThemeColors() {
                const isDarkMode = document.documentElement.classList.contains('dark') || 
                                  document.body.classList.contains('dark');
                
                // Apply the dark class directly to loading screen as well
                if (isDarkMode) {
                    loadingScreen.classList.add('dark');
                } else {
                    loadingScreen.classList.remove('dark');
                }
                
                // Set CSS variables for theme colors
                document.documentElement.style.setProperty('--loading-bg', isDarkMode ? '#1a202c' : '#ffffff');
                document.documentElement.style.setProperty('--loading-bg-dark', '#1a202c');
                document.documentElement.style.setProperty('--loading-text', isDarkMode ? '#818cf8' : '#4f46e5');
                document.documentElement.style.setProperty('--loading-text-dark', '#818cf8');
                document.documentElement.style.setProperty('--circle-inner', isDarkMode ? 'rgba(129, 140, 248, 0.25)' : 'rgba(79, 70, 229, 0.2)');
                document.documentElement.style.setProperty('--circle-outer', isDarkMode ? 'rgba(129, 140, 248, 0)' : 'rgba(79, 70, 229, 0)');
                document.documentElement.style.setProperty('--circle-inner-dark', 'rgba(129, 140, 248, 0.25)');
                document.documentElement.style.setProperty('--circle-outer-dark', 'rgba(129, 140, 248, 0)');
                document.documentElement.style.setProperty('--particle-color', isDarkMode ? '#818cf8' : '#4f46e5');
                document.documentElement.style.setProperty('--particle-color-dark', '#818cf8');
                document.documentElement.style.setProperty('--sparkle-color', isDarkMode ? '#e2e8f0' : '#ffffff');
                document.documentElement.style.setProperty('--sparkle-glow', isDarkMode ? 'rgba(129, 140, 248, 0.8)' : 'rgba(79, 70, 229, 0.8)');
                document.documentElement.style.setProperty('--sparkle-color-dark', '#e2e8f0');
                document.documentElement.style.setProperty('--sparkle-glow-dark', 'rgba(129, 140, 248, 0.8)');
            }
            
            // Initialize theme colors
            updateLoadingThemeColors();
            
            // Listen for theme changes
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('change', function() {
                    if (themeToggle.checked) {
                        document.documentElement.classList.add('dark');
                        document.body.classList.add('dark');
                        loadingScreen.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        document.body.classList.remove('dark');
                        loadingScreen.classList.remove('dark');
                    }
                    updateLoadingThemeColors();
                });
            }
            
            // Enhanced animation sequence
            setTimeout(function() {
                // First enhance the animation
                logo.style.animation = 'none';
                logo.style.transform = 'scale(1.2) translateY(-5px)';
                logo.style.filter = 'drop-shadow(0 0 15px rgba(79, 70, 229, 0.7))';
                
                if (document.body.classList.contains('dark')) {
                    logo.style.filter = 'drop-shadow(0 0 15px rgba(129, 140, 248, 0.8))';
                }
                
                loadingText.style.transform = 'scale(1.1)';
                
                // Animate particles to converge toward center
                particles.forEach(particle => {
                    particle.style.animation = 'none';
                    particle.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    particle.style.transform = 'translate(0, 0) scale(0.8)';
                    particle.style.opacity = '0.8';
                });
                
                setTimeout(function() {
                    // Start hiding animation with scale effect
                    loadingScreen.classList.add('hidden');
                    
                    // Remove from DOM after transition completes
                    setTimeout(function() {
                        loadingScreen.style.display = 'none';
                    }, 800); // Match the transition duration
                }, 600);
            }, 1500); // Show for 1.5 seconds
        });
    </script>
</body>
</html>
